# Right half = central/master side with TrackPoint
CONFIG_BT_DEVICE_NAME="corne-r"
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# Mouse / pointer support
CONFIG_ZMK_MOUSE=y

# USB logging
CONFIG_ZMK_USB_LOGGING=y
CONFIG_ZMK_LOGGING_MINIMAL=n
CONFIG_PS2_LOG_LEVEL_DBG=y
CONFIG_UART_LOG_LEVEL_DBG=y
CONFIG_LOG_DEFAULT_LEVEL=4
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=3000
