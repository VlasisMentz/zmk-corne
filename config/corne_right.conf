# ─── VlaCorne Wireless – Right Half Config (TrackPoint) ──────────────────────
#
# The right half OLED has been removed to free the I2C pins (P0.17 / P0.20)
# for the TrackPoint PS/2 CLK and DATA lines.
#
# Pin assignment (see corne_right.overlay for devicetree details):
#   DATA → P0.17  (was OLED SDA / Pro Micro D0)
#   CLK  → P0.20  (was OLED SCL / Pro Micro D3)
#   RST  → P1.06  (free / Pro Micro D9)
#   VCC  → VCC pin (3.3V regulated output)
#   GND  → GND

# ── Mouse / PS2 TrackPoint ────────────────────────────────────────────────────
# CONFIG_ZMK_MOUSE is already enabled globally in corne.conf.
# These enable the UART-based PS/2 driver from infused-kim's module.
CONFIG_PS2_UART=y

# Trackpoint power-on-reset via firmware (uses the RST GPIO defined in overlay).
# If you use a hardware RC reset circuit instead, set this to n and remove
# the rst-gpios line from the overlay.
CONFIG_ZMK_MOUSE_PS2_TRACKPOINT_POR_MODE_GPIO=y

# Optional: adjust pointer speed (1–8, default 4).
# Raise if the cursor feels too slow for your workflow.
CONFIG_ZMK_MOUSE_PS2_TRACKPOINT_SENSITIVITY=5

# Optional: enable press-to-select (tap the nub to click).
# Not all TrackPoint generations support this; disable if it misbehaves.
# CONFIG_ZMK_MOUSE_PS2_TRACKPOINT_PRESS_TO_SELECT=y
