# ─── VlaCorne Wireless – Right Half Config (TrackPoint) ──────────────────────
#
# The right half OLED has been removed to free the I2C pins (P0.17 / P0.20)
# for the TrackPoint PS/2 CLK and DATA lines.
#
# Pin assignment (see corne_right.overlay for devicetree details):
#   DATA → P0.17  (was OLED SDA / Pro Micro D0)
#   CLK  → P0.20  (was OLED SCL / Pro Micro D3)
#   RST  → P1.06  (free / Pro Micro D9)
#   VCC  → VCC pin (3.3V regulated output)
#   GND  → GND

# ── Split role ────────────────────────────────────────────────────────────────
# The TrackPoint driver (ZMK_INPUT_MOUSE_PS2) has a hard Kconfig dependency:
#   depends on (!ZMK_SPLIT || ZMK_SPLIT_ROLE_CENTRAL)
# The input_listener also calls zmk_hid_mouse_* / zmk_endpoints_send_mouse_report()
# which are central-only functions. There is no peripheral-forwarding path.
# Therefore the TrackPoint half MUST be the central.
# The standard corne shield sets ZMK_SPLIT_ROLE_CENTRAL=y for corne_left via
# its Kconfig.defconfig; we override that here and in corne_left.conf.
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# ── Split battery reporting (moved here because right is now central) ─────────
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# ── Mouse / PS2 TrackPoint ────────────────────────────────────────────────────
# CONFIG_ZMK_MOUSE is already enabled globally in corne.conf.
# Enable the UART-based PS/2 driver from infused-kim's module.
# The "uart-ps2" DT compatible node activates this automatically, but setting
# it explicitly here ensures it is selected even before DT processing.
CONFIG_PS2_UART=y

# Power-on-reset and sensitivity are configured in devicetree, not via Kconfig:
#   rst-gpios    on the zmk,input-mouse-ps2 node  → drives RST at boot
#   tp-sensitivity (0-255, default 128)            → uncomment in overlay to tune
CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_PS2_LOG_LEVEL_DBG=y
CONFIG_ZMK_USB_LOGGING=y