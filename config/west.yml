manifest:
  defaults:
    revision: v0.3
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: englmaxi
      url-base: https://github.com/englmaxi
    - name: infused-kim
      url-base: https://github.com/infused-kim
  projects:
    - name: zmk
      remote: zmkfirmware
      import: app/west.yml
    - name: zmk-dongle-display
      remote: englmaxi
      revision: v0.3
    # PS/2 TrackPoint driver module (UART-based, reliable on nRF52840)
    # Pinned to a tag that is known to work with ZMK v0.3 / nice_nano_v2.
    # Check https://github.com/infused-kim/kb_zmk_ps2_mouse_trackpoint_driver
    # for the latest compatible tag and update the revision below if needed.
    - name: kb_zmk_ps2_mouse_trackpoint_driver
      remote: infused-kim
      revision: main
  self:
    path: config
