# ─── corne-white – ZMK Config ────────────────────────────────────────────────

# Bluetooth
# CONFIG_BT_DEVICE_NAME="corne-black"

# Mouse / pointer support (required for MB1/MB2/MB3 in NAV layer)
CONFIG_ZMK_MOUSE=y

# New configs for mouse support (Blaise)
# USB Logging (connect to COM28 at 115200 to see TrackPoint init logs)
CONFIG_ZMK_USB_LOGGING=y
CONFIG_ZMK_LOGGING_MINIMAL=y
CONFIG_PS2_LOG_LEVEL_DBG=n
CONFIG_UART_LOG_LEVEL_DBG=n
CONFIG_LOG_MODE_IMMEDIATE=n
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=3000
