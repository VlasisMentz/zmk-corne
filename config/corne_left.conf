# ─── VlaCorne Wireless – Left Half Config (OLED) ─────────────────────────────

# Enable the OLED display
CONFIG_ZMK_DISPLAY=y

# Use a dedicated thread for display updates so slow screen redraws
# don't delay key scanning or BLE processing
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Blank the screen after a period of inactivity (saves OLED burn-in / battery)
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y

# ── Widgets ───────────────────────────────────────────────────────────────────

# Current active layer name
CONFIG_ZMK_WIDGET_LAYER_STATUS=y

# Battery level — show numeric percentage instead of icon
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y

# USB vs Bluetooth output indicator
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y

# Words-per-minute counter
CONFIG_ZMK_WPM=y
CONFIG_ZMK_WIDGET_WPM_STATUS=y

# ── Split battery reporting ───────────────────────────────────────────────────
# Fetch the right half's battery level over BLE so both percentages
# can be shown on the left OLED
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
