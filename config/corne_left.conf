# ─── VlaCorne Wireless – Left Half Config (OLED) ─────────────────────────────

# ── Split role ────────────────────────────────────────────────────────────────
# The standard corne shield Kconfig.defconfig sets ZMK_SPLIT_ROLE_CENTRAL=y for
# corne_left by default. We override that here because the right half (with the
# TrackPoint) must be the central — see corne_right.conf for the explanation.
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

# Enable the OLED display (dongle_display sets DEDICATED_THREAD automatically)
CONFIG_ZMK_DISPLAY=y

# Blank the screen after a period of inactivity (prevents OLED burn-in)
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y

# ── Split battery reporting ───────────────────────────────────────────────────
# CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING and _PROXY are
# central-only symbols; they have been moved to corne_right.conf now that the
# right half is central. Leaving them here on a peripheral would fail to build.

# ── Dongle Display (custom status screen) ────────────────────────────────────
# dongle_display's Kconfig.defconfig (v0.3) unconditionally does:
#   config ZMK_DISPLAY_STATUS_SCREEN_CUSTOM
#       select ZMK_WPM
# Kconfig `select` cannot be overridden by CONFIG_ZMK_WPM=n in a .conf file.
# In the pr-testing/mouse_ps2_module_base ZMK fork, wpm.c references
# `as_zmk_keycode_state_changed` / `zmk_event_zmk_keycode_state_changed`,
# which were renamed during the mouse-pointer event-system refactor — causing
# the linker error below:
#   undefined reference to `as_zmk_keycode_state_changed'
#   undefined reference to `zmk_event_zmk_keycode_state_changed'
# The only way to break the select chain (without touching build.yaml) is to
# choose the built-in ZMK status screen instead of the custom one, which
# prevents ZMK_DISPLAY_STATUS_SCREEN_CUSTOM from being selected and therefore
# prevents its `select ZMK_WPM` from firing.
# Trade-off: the OLED shows the default ZMK status screen (layer, battery,
# output) rather than the dongle_display custom layout.
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_DEFAULT=y

# ── 128×32 OLED adjustments ──────────────────────────────────────────────────
CONFIG_LV_Z_VDB_SIZE=32
