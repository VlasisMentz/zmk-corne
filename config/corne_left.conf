# ─── VlaCorne Wireless – Left Half Config (OLED) ─────────────────────────────

# ── Split role ────────────────────────────────────────────────────────────────
# The standard corne shield Kconfig.defconfig sets ZMK_SPLIT_ROLE_CENTRAL=y for
# corne_left by default. We override that here because the right half (with the
# TrackPoint) must be the central — see corne_right.conf for the explanation.
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

# Enable the OLED display (dongle_display sets DEDICATED_THREAD automatically)
CONFIG_ZMK_DISPLAY=y

# Blank the screen after a period of inactivity (prevents OLED burn-in)
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y

# ── Split battery reporting ───────────────────────────────────────────────────
# CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING and _PROXY are
# central-only symbols; they have been moved to corne_right.conf now that the
# right half is central. Leaving them here on a peripheral would fail to build.

# ── Dongle Display (custom status screen) ────────────────────────────────────
# Show left half battery alongside right half battery on the OLED.
# Note: some dongle_display features (e.g. DONGLE_BATTERY) require the display
# half to be central. With the left now as peripheral, that feature will not
# work and is therefore disabled. Basic layer/WPM/battery display is fine.
# CONFIG_ZMK_DONGLE_DISPLAY_DONGLE_BATTERY=y

# ── 128×32 OLED adjustments ──────────────────────────────────────────────────
# The SSD1306 0.91" panel is 128×32 — not enough vertical space for bongo cat,
# active modifiers, or layer name. Disabling them keeps the layout clean and
# prevents I2C instability caused by a large frame buffer.
CONFIG_ZMK_DONGLE_DISPLAY_BONGO_CAT=n
CONFIG_ZMK_DONGLE_DISPLAY_MODIFIERS=n
CONFIG_ZMK_DONGLE_DISPLAY_LAYER=n
CONFIG_LV_Z_VDB_SIZE=32
