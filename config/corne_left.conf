# ─── VlaCorne Wireless – Left Half Config (OLED) ─────────────────────────────

# Enable the OLED display (dongle_display sets DEDICATED_THREAD automatically)
CONFIG_ZMK_DISPLAY=y

# Blank the screen after a period of inactivity (prevents OLED burn-in)
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y

# ── Split battery reporting ───────────────────────────────────────────────────
# Fetch the right half's battery level over BLE (required for dongle_display)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
# Also proxy the right half's battery to the host OS via BLE BAS
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# ── Dongle Display (custom status screen) ────────────────────────────────────
# Show left half battery alongside right half battery on the OLED
CONFIG_ZMK_DONGLE_DISPLAY_DONGLE_BATTERY=y
